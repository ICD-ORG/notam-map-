name: עדכון נוטמים יומי

on:
  schedule:
    # כל יום ב-03:30 UTC = 06:30 שעון ישראל
    - cron: '30 3 * * *'
  workflow_dispatch: {}   # מאפשר גם הרצה ידנית בלחיצת כפתור

permissions:
  contents: write

jobs:
  update-notams:
    runs-on: ubuntu-latest
    steps:
      - name: משיכת הקוד
        uses: actions/checkout@v4

      - name: התקנת Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: הרצת מושך הנוטמים
        run: python updater.py

      - name: שמירת הנתונים החדשים
        run: |
          git config user.name "notam-bot"
          git config user.email "bot@users.noreply.github.com"
          git add notam-data.json
          if git diff --cached --quiet; then
            echo "אין שינויים בנתונים"
          else
            git commit -m "עדכון נוטמים אוטומטי $(date -u +'%d/%m/%Y %H:%M UTC')"
            git push
          fi

